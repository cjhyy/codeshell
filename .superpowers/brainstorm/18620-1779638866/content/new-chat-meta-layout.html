<h2>新聊天输入区：文件夹与分支放在哪里？</h2>
<p class="subtitle">点击你更喜欢的布局，或直接在终端回复你的偏好。</p>

<div class="cards">
  <div class="card" data-choice="a" onclick="toggleSelect(this)">
    <div class="card-image">
      <div class="mockup">
        <div class="mockup-header">A：输入框内混排（当前问题）</div>
        <div class="mockup-body">
          <div style="border:1px solid #cbd5e1;border-radius:14px;padding:12px;background:#fff;">
            <div style="display:flex;gap:8px;margin-bottom:10px;">
              <span style="background:#eef2ff;padding:4px 8px;border-radius:8px;font-size:12px;">📁 codeshell</span>
              <span style="background:#eef2ff;padding:4px 8px;border-radius:8px;font-size:12px;">⑂ main</span>
            </div>
            <div style="color:#64748b;">Ask CodeShell something...</div>
          </div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>A 当前式</h3>
      <p>文件夹/分支跟输入内容挤在一起，视觉上像输入框的一部分。</p>
    </div>
  </div>

  <div class="card" data-choice="b" onclick="toggleSelect(this)">
    <div class="card-image">
      <div class="mockup">
        <div class="mockup-header">B：输入框下方独立 Meta 区（推荐）</div>
        <div class="mockup-body">
          <div style="border:1px solid #cbd5e1;border-radius:14px;padding:14px;background:#fff;color:#64748b;margin-bottom:8px;">Ask CodeShell something...</div>
          <div style="display:flex;gap:8px;align-items:center;padding:8px 10px;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;">
            <span style="font-size:12px;color:#64748b;">Context</span>
            <button class="mock-button" style="padding:4px 8px;">📁 codeshell</button>
            <button class="mock-button" style="padding:4px 8px;">⑂ main</button>
          </div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>B 独立区域</h3>
      <p>输入框只负责文本；文件夹和分支作为上下文控件，单独成一行。</p>
    </div>
  </div>
</div>

<div class="section">
  <p><strong>建议：</strong>采用 B，把文件夹选择和分支选择做成输入框下面的独立 context bar。</p>
</div>
