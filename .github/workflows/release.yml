name: release

# Tag-driven packaging. Push a vX.Y.Z (or vX.Y.Z-rc.N) tag and this builds
# the Electron desktop app on all three native hosts, then attaches the
# installers to a GitHub Release. Pre-release tags (containing a hyphen, e.g.
# v0.5.0-rc.3) are published as a GitHub *prerelease* so they never become the
# "Latest" download.
#
# WHY a real per-OS matrix (not cross-compile): node-pty ships no prebuilt
# binary and must be rebuilt against the installed Electron's ABI on the SAME
# OS it will run on (see packages/desktop/scripts/rebuild-native.ts, fired on
# postinstall). Cross-building from Linux would ship a broken terminal panel.

on:
  push:
    tags:
      - "v*"
  # Manual fallback: run from the Actions tab without tagging. Produces
  # artifacts only (no Release) so you can smoke-test a build mid-iteration.
  workflow_dispatch:

jobs:
  # Guard: on a tag push, every release package's version MUST equal the tag
  # (minus the leading `v`). electron-builder names artifacts and writes
  # latest-*.yml from package.json's version — NOT the tag — so a tag/version
  # mismatch ships a release whose assets carry the WRONG version (users
  # auto-update to a stale build, or the updater manifest points back at an older release). This
  # happened with v0.6.0-rc.10 (tag moved, package.json still rc.9). Fail loud
  # here instead of silently publishing mislabeled binaries.
  verify-version:
    name: verify tag matches package versions
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: assert version == tag
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/v}"
          packages=(
            package.json
            packages/cdp/package.json
            packages/core/package.json
            packages/tui/package.json
            packages/desktop/package.json
          )
          for pkg in "${packages[@]}"; do
            PKG_VERSION="$(node -p "require('./$pkg').version")"
            echo "tag=$TAG  $pkg=$PKG_VERSION"
            if [[ "$TAG" != "$PKG_VERSION" ]]; then
              echo "::error::Tag v$TAG does not match $pkg version $PKG_VERSION. Bump the version (scripts/release.ts) and re-tag." >&2
              exit 1
            fi
          done
          TAG="$TAG" node <<'NODE'
          const fs = require("node:fs");

          const tag = process.env.TAG;
          const errors = [];
          const fail = (message) => errors.push(`::error::${message}`);

          const coreIndex = fs.readFileSync("packages/core/src/index.ts", "utf8");
          const versionMatch = coreIndex.match(
            /^\s*export\s+const\s+VERSION(?:\s*:\s*[^\n=]+)?\s*=\s*["']([^"']+)["'](?:\s+as\s+const)?\s*;?/m,
          );
          if (!versionMatch) {
            fail("packages/core/src/index.ts does not export a VERSION constant.");
          } else {
            const coreVersion = versionMatch[1];
            console.log(`tag=${tag}  packages/core/src/index.ts VERSION=${coreVersion}`);
            if (coreVersion !== tag) {
              fail(`Tag v${tag} does not match packages/core/src/index.ts VERSION ${coreVersion}.`);
            }
          }

          const lock = fs.readFileSync("bun.lock", "utf8");
          const workspaceMatch = lock.match(
            /^  "workspaces": \{[\s\S]*?^  \},\n  "(?:overrides|packages)":/m,
          );
          if (!workspaceMatch) {
            fail("bun.lock workspaces block not found.");
          } else {
            const workspaceBlock = workspaceMatch[0];
            const expectedWorkspaceVersions = [
              { path: "packages/cdp", name: "@cjhyy/code-shell-cdp" },
              { path: "packages/core", name: "@cjhyy/code-shell-core" },
              { path: "packages/desktop", name: "@cjhyy/code-shell-desktop" },
              { path: "packages/tui", name: "@cjhyy/code-shell-tui" },
            ];
            const escapeRegex = (value) => value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");

            for (const workspace of expectedWorkspaceVersions) {
              const entryMatch = workspaceBlock.match(
                new RegExp(`^    "${escapeRegex(workspace.path)}": \\{([\\s\\S]*?)^    \\},`, "m"),
              );
              if (!entryMatch) {
                fail(`bun.lock is missing workspace entry ${workspace.path}.`);
                continue;
              }
              const entry = entryMatch[1];
              const nameMatch = entry.match(/^\s{6}"name": "([^"]+)"/m);
              const lockVersionMatch = entry.match(/^\s{6}"version": "([^"]+)"/m);
              if (nameMatch?.[1] !== workspace.name) {
                fail(
                  `bun.lock workspace ${workspace.path} has name ${nameMatch?.[1] ?? "<missing>"}, expected ${workspace.name}.`,
                );
              }
              if (!lockVersionMatch) {
                fail(`bun.lock workspace ${workspace.path} is missing a version.`);
                continue;
              }
              const lockVersion = lockVersionMatch[1];
              console.log(`tag=${tag}  bun.lock ${workspace.path}=${lockVersion}`);
              if (lockVersion !== tag) {
                fail(`Tag v${tag} does not match bun.lock ${workspace.path} version ${lockVersion}.`);
              }
            }

            const staleWorkspaceVersions = [
              ...new Set(
                [...workspaceBlock.matchAll(/^\s{6}"version": "([^"]+)"/gm)]
                  .map((match) => match[1])
                  .filter((version) => version !== tag),
              ),
            ];
            if (staleWorkspaceVersions.length > 0) {
              fail(
                `bun.lock contains workspace version(s) that do not match ${tag}: ${staleWorkspaceVersions.join(", ")}.`,
              );
            }
          }

          const staleOwnPackageSpecs = [
            ...new Set(
              [...lock.matchAll(/@cjhyy\/code-shell(?:-[A-Za-z0-9-]+)?@([0-9]+\.[0-9]+\.[0-9]+(?:-[0-9A-Za-z.-]+)?)/g)]
                .filter((match) => match[1] !== tag)
                .map((match) => match[0]),
            ),
          ];
          if (staleOwnPackageSpecs.length > 0) {
            fail(`bun.lock contains stale CodeShell package specs: ${staleOwnPackageSpecs.join(", ")}.`);
          }

          if (errors.length > 0) {
            for (const error of errors) console.error(error);
            process.exit(1);
          }
          NODE

  npm-publish:
    name: publish npm packages
    # Only on a tag push — a workflow_dispatch run must not publish to npm.
    if: startsWith(github.ref, 'refs/tags/')
    needs: verify-version
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: install
        run: bun install --frozen-lockfile

      # Build core + tui + meta. Each publishable package ships only its dist/
      # (files: ["dist"]), so the dist MUST exist before publish. The meta
      # package's dist is generated by scripts/build-meta.ts (re-export shims).
      - name: build
        run: bun run build

      # dist-tag policy: a plain tag (v0.6.0) → latest; a pre-release tag with a
      # hyphen (v0.6.0-rc.1) → next, so `npm i @cjhyy/code-shell` never resolves
      # to a pre-release. Mirrors the GitHub-release prerelease判定 above.
      # Publish order is dependency order: core → tui → meta. tui depends on core
      # and meta depends on both; bun publish rewrites each `workspace:*` to the
      # concrete version, but the referenced version must already be on the
      # registry, so the depended-upon package must publish first.
      #
      # Auth: `bun publish` reads NPM_CONFIG_TOKEN from the environment (its
      # documented CI mechanism). Writing ~/.npmrc does NOT work — bun does not
      # reliably read $HOME/.npmrc when publishing with --cwd, so it fails with
      # "missing authentication". The NPM_TOKEN secret must be a token whose 2FA
      # level allows non-interactive publish (automation token, or account with
      # publish-2FA off).
      - name: publish (core → tui → meta)
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [[ "${{ github.ref_name }}" == *-* ]]; then
            NPM_TAG=next
          else
            NPM_TAG=latest
          fi
          echo "Publishing with dist-tag: $NPM_TAG"
          bun publish --cwd packages/core --tag "$NPM_TAG"
          bun publish --cwd packages/tui --tag "$NPM_TAG"
          bun publish --tag "$NPM_TAG"

  package:
    name: package (${{ matrix.os }})
    # Gate on the version check so a mismatch never produces mislabeled artifacts.
    # verify-version is skipped on workflow_dispatch (no tag); allow that path so
    # manual smoke-test builds still run, but block only a real FAILURE.
    needs: verify-version
    if: ${{ always() && needs.verify-version.result != 'failure' }}
    permissions:
      contents: read
    strategy:
      # Don't cancel the other OS builds if one fails — a red Windows build
      # shouldn't deprive you of the mac/linux artifacts.
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: linux
          - os: macos-latest
            artifact: mac
          - os: windows-latest
            artifact: windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      # node-gyp (used to rebuild node-pty against Electron's ABI) imports
      # Python's `distutils`, which was REMOVED from the stdlib in Python 3.12 —
      # the version now default on the macOS/ubuntu runners. Without this the
      # native rebuild dies with "No module named 'distutils'". Pin Python 3.11
      # (still ships distutils) and ensure setuptools is present as a backstop.
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: ensure setuptools (distutils for node-gyp)
        run: python -m pip install --upgrade setuptools

      # Installs the whole workspace. The desktop package's postinstall
      # (rebuild:native) rebuilds node-pty against Electron's ABI here, on the
      # real target OS — the crux of why this is an OS matrix.
      - name: install
        run: bun install --frozen-lockfile

      # Build core + cdp — desktop needs both workspace packages' dist/ present.
      # core: kept external in the main bundle and loaded at runtime (main
      # process spawns it), so its dist must exist. cdp: imported by
      # src/main/browser-driver/cdp-driver.ts and bundled INTO the main process
      # (not external), so esbuild must resolve its dist at build time — without
      # this the desktop build fails with `Could not resolve "@cjhyy/code-shell-cdp"`.
      # We deliberately do NOT run the root `bun run build` (which also builds
      # tui): the desktop app doesn't use tui, and tui's build script uses
      # `cp -r`, which the Windows runner's cp rejects ("illegal option -- r").
      - name: build core + cdp
        run: |
          bun run --filter '@cjhyy/code-shell-core' build
          bun run --filter '@cjhyy/code-shell-cdp' build

      # Four desktop sub-builds (main / preload / renderer / mobile) → out/.
      - name: build desktop
        run: bun run --cwd packages/desktop build

      # Materialize the code-shell-core workspace symlink into a real in-tree
      # dir BEFORE electron-builder runs (see scripts/predist.ts). We invoke it
      # explicitly because the next step calls the electron-builder binary
      # directly (not `bun run dist`), which would bypass the predist/prepack
      # lifecycle hook.
      - name: materialize workspace core (predist)
        working-directory: packages/desktop
        run: bun run scripts/predist.ts

      - name: expose optional mac signing secrets
        if: matrix.artifact == 'mac'
        shell: bash
        env:
          MAC_CSC_LINK: ${{ secrets.CSC_LINK }}
          MAC_CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          MAC_CSC_NAME: ${{ secrets.CSC_NAME }}
          MAC_APPLE_ID: ${{ secrets.APPLE_ID }}
          MAC_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          MAC_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          append_env() {
            local name="$1"
            local value="$2"
            if [[ -n "$value" ]]; then
              {
                echo "$name<<__CODESHELL_${name}__"
                printf '%s\n' "$value"
                echo "__CODESHELL_${name}__"
              } >> "$GITHUB_ENV"
            fi
          }

          append_env CSC_LINK "$MAC_CSC_LINK"
          append_env CSC_KEY_PASSWORD "$MAC_CSC_KEY_PASSWORD"
          append_env CSC_NAME "$MAC_CSC_NAME"
          append_env APPLE_ID "$MAC_APPLE_ID"
          append_env APPLE_APP_SPECIFIC_PASSWORD "$MAC_APPLE_APP_SPECIFIC_PASSWORD"
          append_env APPLE_TEAM_ID "$MAC_APPLE_TEAM_ID"

      # electron-builder. Per-OS target comes from packages/desktop/package.json
      # build.{mac,win,linux}. `--publish never`: we attach artifacts ourselves
      # in the release job, so electron-builder must NOT try to publish (and a
      # missing token never fails the build). Call the binary directly via bunx
      # instead of `bun run dist -- …` — the `--` passthrough is version-fragile.
      - name: package installers
        working-directory: packages/desktop
        run: bunx electron-builder --publish never

      - name: verify auto-update metadata
        shell: bash
        run: |
          set -euo pipefail
          case "${{ matrix.artifact }}" in
            mac) test -f packages/desktop/dist/latest-mac.yml ;;
            windows) test -f packages/desktop/dist/latest.yml ;;
            linux) test -f packages/desktop/dist/latest-linux.yml ;;
          esac

      - name: upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: codeshell-${{ matrix.artifact }}
          # electron-builder writes installers and update metadata to
          # packages/desktop/dist. The *.yml files are the updater entry points
          # (e.g. latest-mac.yml); *.blockmap enables differential downloads.
          path: |
            packages/desktop/dist/*.exe
            packages/desktop/dist/*.dmg
            packages/desktop/dist/*.zip
            packages/desktop/dist/*.AppImage
            packages/desktop/dist/*.yml
            packages/desktop/dist/*.blockmap
          if-no-files-found: error
          retention-days: 14

  release:
    name: publish GitHub Release
    # Only when triggered by a tag push — workflow_dispatch runs leave artifacts
    # in the Actions tab without cutting a Release.
    if: startsWith(github.ref, 'refs/tags/')
    needs: [package, npm-publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      # Publish via the gh CLI (not softprops/action-gh-release): the action
      # create+upload in one pass and intermittently PATCH/DELETE a
      # not-yet-registered asset id → `Not Found - update-a-release-asset`,
      # marking the step red even though every asset uploaded. `gh release`
      # separates create from an idempotent `upload --clobber`, so it never
      # 404s and is safe to re-run on the same tag.
      - name: publish release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # Any tag with a hyphen (rc, beta, alpha) → prerelease, never "Latest".
          PRERELEASE=()
          case "$TAG" in *-*) PRERELEASE=(--prerelease) ;; esac

          cat > /tmp/release-notes.md <<'NOTES'
          自动打包构建 — 用于在其他电脑(尤其 Windows)安装测试。

          **安装包签名说明**:
          - Windows (.exe / nsis):SmartScreen 会拦,点「更多信息 → 仍要运行」。
          - macOS 未配置 Developer ID 签名密钥时,产物会使用固定 requirement 的 ad-hoc 签名。
          - 从旧 cdhash ad-hoc 版本升级到固定 requirement 版本时,需要下载 .dmg 手动覆盖安装一次;之后固定 requirement 版本之间可走应用内更新。
          - macOS 如已配置 Developer ID + notarization secrets,会使用正式签名/公证,应用内自动更新可直接安装。

          产物按平台分目录上传。node-pty 已按各平台 Electron ABI 重编。
          NOTES

          # Create the release if absent (idempotent across re-runs).
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --title "$TAG" \
              --notes-file /tmp/release-notes.md \
              "${PRERELEASE[@]}"
          fi

          # Flatten per-platform artifact dirs, keeping ONLY real release assets.
          # electron-builder also emits builder-debug.yml in every platform dir;
          # uploading all *.yml would collide on that shared basename (gh upload
          # names assets by basename; --clobber only dedups against the release,
          # not within one command) → 422. So allowlist installer + update files.
          mapfile -t ASSETS < <(find artifacts -type f \( \
            -name '*.exe' -o -name '*.dmg' -o -name '*.zip' -o -name '*.AppImage' \
            -o -name '*.blockmap' -o -name 'latest*.yml' \) | sort)
          if [ ${#ASSETS[@]} -eq 0 ]; then
            echo "no build artifacts found under artifacts/" >&2
            exit 1
          fi
          # Guard: fail loudly if two platforms ever ship the same asset basename
          # (would silently overwrite one another on upload).
          dupes=$(printf '%s\n' "${ASSETS[@]}" | xargs -n1 basename | sort | uniq -d)
          if [ -n "$dupes" ]; then
            echo "duplicate asset basenames across platforms:" >&2
            echo "$dupes" >&2
            exit 1
          fi
          gh release upload "$TAG" "${ASSETS[@]}" --clobber
