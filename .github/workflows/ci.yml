name: ci

on:
  push:
    branches: [main]
  pull_request:

# Standard §S7 + Gate 4: the gates this workflow protects are
#   - safety guards (engine-bypass scan, sandbox tests, SSRF tests)
#   - correctness (chat-session isolation, cwd consistency)
#   - typecheck no-new-errors (clean baseline today; locked here)
#   - SDK smoke (the public API contract from B3)
# Anything that goes red here blocks merges to main.

jobs:
  guards:
    name: guards (engine-bypass + lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: install
        run: bun install --frozen-lockfile
      - name: engine-bypass guard
        run: bash scripts/check-no-engine-bypass.sh
      - name: lint
        run: bun run lint

  typecheck:
    name: typecheck (tsc --noEmit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: install
        run: bun install --frozen-lockfile
      - name: typecheck
        # Baseline is clean as of B4 — any new error fails CI.
        run: bun run typecheck

  tests:
    name: tests (targeted)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: install
        run: bun install --frozen-lockfile
      - name: gate test suites
        # Targeted instead of the full suite because the broader test set
        # currently has pre-existing failures unrelated to core stability
        # (OpenAI capabilities + a task.ts named-export issue). Lock the
        # core stability surface here; sweep the rest as separate work.
        run: |
          bun test \
            packages/chat/src/*.test.ts \
            packages/coding/src/git/worktree/crud.test.ts \
            packages/coding/src/tools/drive-agent.test.ts \
            packages/coding/src/tools/drive-agent-worktree.test.ts \
            packages/core/src/preset/preset-builtin-tools.test.ts \
            packages/core/src/session/session-origin.test.ts \
            packages/core/src/tool-system/builtin/tool-guards.test.ts \
            packages/desktop/scripts/mock-provider-server.test.mjs \
            packages/desktop/src/main/im-gateway-control-server.test.ts \
            packages/server/src/mobile-remote/tunnel-manager.test.ts \
            packages/desktop/src/main/plugin-panel-protocol.test.ts \
            tests/agent-notifications.test.ts \
            tests/background-agent-protocol.test.ts \
            tests/chat-session-isolation.test.ts \
            tests/chat-session-queue.test.ts \
            tests/chat-session-manager.test.ts \
            tests/engine-bypass-guard.test.ts \
            tests/hooks-on-permission-check.test.ts \
            tests/mcp-default-unsafe.test.ts \
            tests/permission.test.ts \
            tests/runtime-close.test.ts \
            tests/safe-spawn.test.ts \
            tests/sandbox.test.ts \
            tests/sdk-smoke.test.ts \
            tests/session-cold-start.test.ts \
            tests/tool-cwd.test.ts \
            tests/web-fetch-ssrf.test.ts

  coverage:
    name: builtin integration coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: install
        run: bun install --frozen-lockfile
      - name: ToolRegistry harness + builtin coverage gates
        run: bun run test:coverage

  electron-e2e:
    name: Electron E2E (provider + panels + plugin sandbox)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: install
        run: bun install --frozen-lockfile
      - name: build runtime and desktop
        run: |
          bun run build
          bun run --cwd packages/desktop build
      - name: real Electron E2E
        run: xvfb-run -a bun run --cwd packages/desktop test:e2e

  tests-windows:
    name: tests (windows port — real win32)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: install
        run: bun install --frozen-lockfile
      - name: windows-port unit suites
        # The win32 code paths (shell selection, taskkill, PATHEXT resolution,
        # case-insensitive paths, CRLF, sandbox fail-open) are only mock-tested
        # on the macOS/Linux dev box (process.platform is redefined). Run the
        # SAME suites on a real Windows host so the actual branches execute.
        run: |
          bun test `
            packages/core/src/runtime/shell-invocation.test.ts `
            packages/core/src/runtime/kill-win32.test.ts `
            packages/core/src/tool-system/path-policy-win32.test.ts `
            packages/core/src/tool-system/builtin/crlf.test.ts `
            packages/core/src/tool-system/sandbox/sandbox-win32.test.ts `
            packages/core/src/utils/exec.test.ts `
            packages/server/src/mobile-remote/cloudflared-binary.test.ts
