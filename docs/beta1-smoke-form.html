<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>codeshell beta1 — Smoke 验收</title>
<style>
  :root { --ok:#16a34a; --bad:#dc2626; --bg:#0f1115; --card:#1a1d24; --line:#2a2f3a; --txt:#e5e7eb; --muted:#9ca3af; --blue:#3b82f6; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--txt); font:14px/1.6 -apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif; padding:24px; }
  h1 { font-size:20px; margin:0 0 4px; }
  .sub { color:var(--muted); margin:0 0 20px; font-size:13px; }
  .bar { position:sticky; top:0; z-index:10; background:var(--bg); padding:12px 0; border-bottom:1px solid var(--line); display:flex; gap:10px; align-items:center; margin-bottom:16px; }
  button { font:inherit; cursor:pointer; border:1px solid var(--line); background:var(--card); color:var(--txt); padding:8px 14px; border-radius:8px; }
  button:hover { border-color:var(--blue); }
  button.primary { background:var(--blue); border-color:var(--blue); color:#fff; font-weight:600; }
  button.add { border-style:dashed; width:100%; padding:14px; color:var(--muted); margin-top:8px; }
  .count { color:var(--muted); font-size:13px; margin-left:auto; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:16px; margin-bottom:14px; }
  .card.ok { border-color:var(--ok); }
  .card.bad { border-color:var(--bad); }
  .row { display:flex; gap:12px; align-items:flex-start; }
  .num { font-weight:700; color:var(--blue); min-width:24px; }
  .title { font-weight:600; font-size:15px; flex:1; }
  .title[contenteditable] { outline:none; border-bottom:1px dashed transparent; }
  .title[contenteditable]:focus { border-bottom-color:var(--blue); }
  .expect { color:var(--muted); font-size:13px; margin:4px 0 10px 36px; }
  .ops { display:flex; gap:8px; margin:0 0 10px 36px; }
  .pill { padding:6px 14px; border-radius:20px; border:1px solid var(--line); font-size:13px; }
  .pill.sel-ok { background:var(--ok); border-color:var(--ok); color:#fff; }
  .pill.sel-bad { background:var(--bad); border-color:var(--bad); color:#fff; }
  .drop { margin:0 0 0 36px; border:2px dashed var(--line); border-radius:10px; padding:18px; text-align:center; color:var(--muted); font-size:13px; transition:.15s; }
  .drop.over { border-color:var(--blue); background:rgba(59,130,246,.08); color:var(--blue); }
  .drop img { max-width:100%; max-height:320px; border-radius:8px; margin-top:8px; display:block; }
  textarea { width:calc(100% - 36px); margin-left:36px; margin-top:10px; background:var(--bg); color:var(--txt); border:1px solid var(--line); border-radius:8px; padding:10px; font:inherit; resize:vertical; min-height:48px; }
  .del { margin-left:8px; color:var(--bad); border-color:transparent; background:transparent; padding:4px 8px; }
  .hint { background:#1e293b; border:1px solid var(--blue); border-radius:10px; padding:12px 14px; font-size:13px; margin-bottom:16px; }
  code { background:#000; padding:2px 6px; border-radius:4px; font-size:12px; }
</style>
</head>
<body>
<h1>codeshell beta1 — 交互式 Smoke 验收</h1>
<p class="sub">每步:拖截图进去 + 写备注 + 点 ✅成功 / ❌失败。可加自定义条目。做完点「导出 JSON」。</p>

<div class="hint">
  📌 用法:① 照每步操作 codeshell → ② 拖截图到对应卡片(也可粘贴) → ③ 写备注、勾状态 →
  ④ 全部做完点右上「<b>导出 JSON</b>」→ ⑤ 把下载的 <code>beta1-smoke.json</code> 告诉 Claude(放到仓库根目录或说一声路径)。
  Claude 会把内容+截图写进 <code>TODO-feedback.md</code>。
</div>

<div class="bar">
  <button class="primary" onclick="exportJSON()">⬇ 导出 JSON</button>
  <button onclick="addItem()">➕ 添加条目</button>
  <span class="count" id="count"></span>
</div>

<div id="list"></div>
<button class="add" onclick="addItem()">➕ 添加自定义条目（临时发现的问题 / 想额外验的点）</button>

<script>
const STEPS = [
  ["启动应用", "原生终端跑 bun run dev → 窗口正常弹出，无白屏/崩溃。若报 CouldntReadCurrentDirectory = 中文路径 bug，确认没用 VSCode 终端"],
  ["新会话对话", "新建会话→选项目(或不使用项目)→发一句话→AI 流式回复正常，不卡转圈"],
  ["模型切换", "切换模型(Opus↔Sonnet)→不弹『保存中』卡死→下一条用新模型"],
  ["文件编辑", "让 AI 改一个文件→出现『文件变更』卡片，能看到 diff"],
  ["审查面板范围", "点 turn 卡片『审查』→默认只显示该轮文件(非整工作区)→顶部能切范围"],
  ["图片附件", "拖/粘贴一张图到输入框→出现图片 chip(缩略图+文件名)→发送后(视觉模型)AI 能看到"],
  ["后台 shell", "让 AI 后台跑长命令(如 sleep 5 && echo done)→进后台、有输出回流、不阻塞输入"],
  ["Undo 撤销", "做过文件编辑后用 /undo→上一步改动被回退，有明确反馈"],
  ["设置页按项目选配置", "设置→Hooks/环境/子代理任一页→有『全局/选项目』选择器，切换后内容跟着变"],
];

let items = STEPS.map(([t,e],i)=>({ id:i+1, title:t, expect:e, status:null, note:"", img:null, custom:false }));

function render(){
  const list = document.getElementById('list');
  list.innerHTML = '';
  items.forEach((it, idx)=>{
    const card = document.createElement('div');
    card.className = 'card' + (it.status==='ok'?' ok':it.status==='bad'?' bad':'');
    card.innerHTML = `
      <div class="row">
        <span class="num">${idx+1}</span>
        <span class="title" ${it.custom?'contenteditable':''} data-k="title">${it.title}</span>
        ${it.custom?'<button class="del" data-k="del">删除</button>':''}
      </div>
      ${it.expect?`<div class="expect">✓ 算过：${it.expect}</div>`:''}
      <div class="ops">
        <span class="pill ${it.status==='ok'?'sel-ok':''}" data-k="ok">✅ 成功</span>
        <span class="pill ${it.status==='bad'?'sel-bad':''}" data-k="bad">❌ 失败</span>
      </div>
      <div class="drop ${it.img?'has':''}" data-k="drop">
        ${it.img?`<img src="${it.img}">`:'拖 / 粘贴截图到这里（可选）'}
      </div>
      <textarea data-k="note" placeholder="备注：看到什么 / 哪里不对 / 复现步骤…">${it.note}</textarea>
    `;
    // events
    card.querySelector('[data-k=ok]').onclick = ()=>{ it.status = it.status==='ok'?null:'ok'; render(); };
    card.querySelector('[data-k=bad]').onclick = ()=>{ it.status = it.status==='bad'?null:'bad'; render(); };
    card.querySelector('[data-k=note]').oninput = e=> it.note = e.target.value;
    const titleEl = card.querySelector('[data-k=title]');
    if(it.custom) titleEl.oninput = e=> it.title = e.target.innerText;
    const del = card.querySelector('[data-k=del]'); if(del) del.onclick = ()=>{ items.splice(idx,1); render(); };
    const drop = card.querySelector('[data-k=drop]');
    bindDrop(drop, it);
    list.appendChild(card);
  });
  const done = items.filter(i=>i.status).length;
  document.getElementById('count').textContent = `${done}/${items.length} 已标记`;
}

function bindDrop(el, it){
  el.ondragover = e=>{ e.preventDefault(); el.classList.add('over'); };
  el.ondragleave = ()=> el.classList.remove('over');
  el.ondrop = e=>{ e.preventDefault(); el.classList.remove('over'); const f=e.dataTransfer.files[0]; if(f) readImg(f,it); };
  el.onpaste = e=>{ const f=[...e.clipboardData.items].find(i=>i.type.startsWith('image'))?.getAsFile(); if(f) readImg(f,it); };
  el.tabIndex = 0;
}
function readImg(f, it){ const r=new FileReader(); r.onload=()=>{ it.img=r.result; render(); }; r.readAsDataURL(f); }

// 全局粘贴：贴到最近聚焦的卡片不易，简单起见提示用户拖拽；保留卡片内 paste

function addItem(){
  const maxId = items.reduce((m,i)=>Math.max(m,i.id),0);
  items.push({ id:maxId+1, title:"自定义条目（点这里改标题）", expect:"", status:null, note:"", img:null, custom:true });
  render();
  window.scrollTo(0, document.body.scrollHeight);
}

function exportJSON(){
  const out = {
    exportedAt: new Date().toISOString(),
    summary: { total: items.length, ok: items.filter(i=>i.status==='ok').length, bad: items.filter(i=>i.status==='bad').length, unmarked: items.filter(i=>!i.status).length },
    items: items.map((it,idx)=>({ index: idx+1, title: it.title, expect: it.expect, status: it.status||'unmarked', note: it.note, hasImage: !!it.img, image: it.img||null }))
  };
  const blob = new Blob([JSON.stringify(out,null,2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'beta1-smoke.json';
  a.click();
}

render();
</script>
</body>
</html>
