<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">TUI、Desktop、SDK 与 Phone Remote 作为 Core Host</title>
  <desc id="desc">展示 TUI、desktop、SDK、phone remote 如何作为 host 使用 core，并标出 TUI UI thin、desktop renderer thin、desktop main mostly broker but has selected services。</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#334155"/></marker>
    <style>
      .bg{fill:#f8fafc}.title{font:700 34px ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#0f172a}.sub{font:400 16px ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#475569}.h{font:700 16px ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#0f172a}.t{font:500 14px ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#334155}.s{font:400 12px ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#64748b}.box{stroke:#cbd5e1;stroke-width:1.5;rx:8}.blue{fill:#dbeafe;stroke:#60a5fa}.purple{fill:#ede9fe;stroke:#a78bfa}.green{fill:#dcfce7;stroke:#4ade80}.orange{fill:#ffedd5;stroke:#fb923c}.gray{fill:#f1f5f9;stroke:#94a3b8}.warn{fill:#fef3c7;stroke:#f59e0b}.group{fill:#ffffff;stroke:#e2e8f0;stroke-width:1.5;rx:8}.line{fill:none;stroke:#334155;stroke-width:2;marker-end:url(#arrow)}.dash{fill:none;stroke:#64748b;stroke-width:2;stroke-dasharray:7 6;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text class="title" x="56" y="58">Hosts 消费 Core：TUI、Desktop、SDK、Phone Remote</text>
  <text class="sub" x="56" y="88">host 负责 UI、IO、IPC 和服务编排；core 负责协议、会话、Engine、工具与模型循环。直接嵌入 Engine 仍是合法例外。</text>

  <rect class="group" x="60" y="126" width="700" height="292"/>
  <text class="h" x="86" y="158">TUI host：UI thin，in-process protocol</text>
  <rect class="box blue" x="110" y="210" width="150" height="58"/><text class="h" x="154" y="234">TUI UI</text><text class="s" x="138" y="253">thin React + store</text>
  <rect class="box blue" x="310" y="210" width="150" height="58"/><text class="h" x="348" y="234">Renderer</text><text class="s" x="338" y="253">terminal drawing</text>
  <rect class="box purple" x="510" y="210" width="170" height="58"/><text class="h" x="552" y="234">AgentClient</text><text class="s" x="540" y="253">in-process transport</text>
  <rect class="box purple" x="310" y="322" width="170" height="58"/><text class="h" x="352" y="346">AgentServer</text><text class="s" x="342" y="365">same process seam</text>
  <rect class="box green" x="550" y="322" width="120" height="58"/><text class="h" x="582" y="346">Engine</text><text class="s" x="576" y="365">core run</text>
  <path class="line" d="M260 239 L310 239"/><path class="line" d="M460 239 L510 239"/><path class="line" d="M595 268 C595 300 520 312 480 322"/><path class="line" d="M480 351 L550 351"/>

  <rect class="group" x="820" y="126" width="720" height="292"/>
  <text class="h" x="846" y="158">Desktop host：renderer thin，main mostly broker + selected services</text>
  <rect class="box blue" x="870" y="204" width="150" height="58"/><text class="h" x="912" y="228">Renderer</text><text class="s" x="898" y="247">thin UI / no core import</text>
  <rect class="box purple" x="1070" y="204" width="130" height="58"/><text class="h" x="1108" y="228">Preload</text><text class="s" x="1094" y="247">IPC boundary</text>
  <rect class="box purple" x="1250" y="188" width="220" height="90"/><text class="h" x="1292" y="212">Desktop main</text><text class="s" x="1280" y="233">mostly broker</text><text class="s" x="1280" y="249">settings / runs / skills</text><text class="s" x="1280" y="265">credentials / memory / browser</text>
  <rect class="box green" x="1070" y="324" width="210" height="58"/><text class="h" x="1114" y="348">agent-server-stdio</text><text class="s" x="1102" y="367">per-session worker</text>
  <rect class="box green" x="1340" y="324" width="130" height="58"/><text class="h" x="1378" y="348">Engine</text><text class="s" x="1362" y="367">runs in worker</text>
  <path class="line" d="M1020 233 L1070 233"/><path class="line" d="M1200 233 L1250 233"/><path class="line" d="M1360 278 C1358 312 1298 324 1280 336"/><path class="line" d="M1280 353 L1340 353"/>

  <rect class="group" x="60" y="480" width="700" height="226"/>
  <text class="h" x="86" y="512">SDK / embedded host</text>
  <rect class="box blue" x="120" y="574" width="170" height="58"/><text class="h" x="172" y="598">SDK app</text><text class="s" x="148" y="617">custom UI / workflow</text>
  <rect class="box purple" x="360" y="574" width="180" height="58"/><text class="h" x="396" y="598">选择 seam</text><text class="s" x="388" y="617">protocol or direct Engine.run</text>
  <rect class="box green" x="600" y="574" width="110" height="58"/><text class="h" x="632" y="598">Core</text><text class="s" x="628" y="617">Engine APIs</text>
  <path class="line" d="M290 603 L360 603"/><path class="line" d="M540 603 L600 603"/>
  <rect class="box gray" x="120" y="662" width="590" height="28"/><text class="s" x="148" y="681">这条路径是“不是所有 Engine.run 都必经 protocol”的宿主级例外之一。</text>

  <rect class="group" x="820" y="480" width="720" height="226"/>
  <text class="h" x="846" y="512">Phone remote：远端控制桌面 session</text>
  <rect class="box blue" x="870" y="574" width="150" height="58"/><text class="h" x="906" y="598">Phone UI</text><text class="s" x="898" y="617">mobile React</text>
  <rect class="box purple" x="1070" y="574" width="160" height="58"/><text class="h" x="1108" y="598">Remote room</text><text class="s" x="1098" y="617">pairing / tunnel</text>
  <rect class="box purple" x="1280" y="574" width="170" height="58"/><text class="h" x="1318" y="598">Desktop main</text><text class="s" x="1308" y="617">resident agent / routing</text>
  <path class="line" d="M1020 603 L1070 603"/><path class="line" d="M1230 603 L1280 603"/>
  <path class="dash" d="M1365 574 C1380 500 1392 430 1405 382"/>
  <rect class="box gray" x="870" y="662" width="580" height="28"/><text class="s" x="898" y="681">手机复用桌面会话流、审批与 streamReducer，不把 core 搬到手机进程。</text>

  <rect class="group" x="60" y="760" width="1480" height="86"/>
  <text class="h" x="86" y="792">共同 core 边界</text>
  <rect class="box green" x="190" y="806" width="190" height="28"/><text class="s" x="218" y="825">protocol / sessions</text>
  <rect class="box green" x="450" y="806" width="190" height="28"/><text class="s" x="478" y="825">Engine / TurnLoop</text>
  <rect class="box green" x="710" y="806" width="190" height="28"/><text class="s" x="746" y="825">Tool / LLM layers</text>
  <rect class="box green" x="970" y="806" width="190" height="28"/><text class="s" x="1008" y="825">settings / memory</text>
  <rect class="box green" x="1230" y="806" width="190" height="28"/><text class="s" x="1268" y="825">runs / automation</text>
  <path class="dash" d="M610 380 C610 530 610 700 548 806"/>
  <path class="dash" d="M1405 382 C1405 570 1360 730 1325 806"/>
  <path class="dash" d="M655 632 C680 710 760 760 805 806"/>
</svg>
