<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="850" viewBox="0 0 1400 850" role="img" aria-labelledby="title desc">
  <title id="title">Protocol 与 Session 关系图</title>
  <desc id="desc">展示 AgentClient、Transport、AgentServer、ChatSession、Engine、Transcript、State 的关系，并标出 direct Engine.run 例外。</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#334155"/></marker>
    <style>
      .bg{fill:#f8fafc}.title{font:700 34px ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#0f172a}.sub{font:400 16px ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#475569}.h{font:700 16px ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#0f172a}.t{font:500 14px ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#334155}.s{font:400 12px ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#64748b}.box{stroke:#cbd5e1;stroke-width:1.5;rx:8}.blue{fill:#dbeafe;stroke:#60a5fa}.purple{fill:#ede9fe;stroke:#a78bfa}.green{fill:#dcfce7;stroke:#4ade80}.orange{fill:#ffedd5;stroke:#fb923c}.gray{fill:#f1f5f9;stroke:#94a3b8}.warn{fill:#fef3c7;stroke:#f59e0b}.group{fill:#ffffff;stroke:#e2e8f0;stroke-width:1.5;rx:8}.line{fill:none;stroke:#334155;stroke-width:2;marker-end:url(#arrow)}.dash{fill:none;stroke:#64748b;stroke-width:2;stroke-dasharray:7 6;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="bg" width="1400" height="850"/>
  <text class="title" x="56" y="58">Protocol 与 Session：UI seam 和磁盘状态</text>
  <text class="sub" x="56" y="88">多数 host 通过 JSON-RPC seam 驱动 Engine；同时保留 SDK/子 Agent/专用 runner 直接调用 Engine.run 的嵌入式路径。</text>

  <rect class="group" x="70" y="140" width="1260" height="260"/>
  <text class="h" x="96" y="172">常见 request path</text>
  <rect class="box blue" x="110" y="220" width="190" height="64"/><text class="h" x="153" y="246">AgentClient</text><text class="s" x="137" y="265">run / approve / steer</text>
  <rect class="box purple" x="380" y="220" width="190" height="64"/><text class="h" x="426" y="246">Transport</text><text class="s" x="412" y="265">in-process / stdio / tcp</text>
  <rect class="box purple" x="650" y="220" width="190" height="64"/><text class="h" x="696" y="246">AgentServer</text><text class="s" x="682" y="265">dispatch / approvals</text>
  <rect class="box green" x="920" y="220" width="190" height="64"/><text class="h" x="960" y="246">ChatSession</text><text class="s" x="950" y="265">FIFO / one active turn</text>
  <rect class="box green" x="1160" y="220" width="130" height="64"/><text class="h" x="1185" y="246">Engine</text><text class="s" x="1180" y="265">run / query</text>
  <path class="line" d="M300 252 L380 252"/><path class="line" d="M570 252 L650 252"/><path class="line" d="M840 252 L920 252"/><path class="line" d="M1110 252 L1160 252"/>
  <path class="dash" d="M1160 284 C900 342 520 342 300 284"/>
  <text class="s" x="612" y="355">StreamEvent / approval_request / status 反向通知 UI</text>

  <rect class="group" x="70" y="460" width="820" height="250"/>
  <text class="h" x="96" y="492">Session disk model</text>
  <rect class="box orange" x="120" y="540" width="190" height="62"/><text class="h" x="164" y="565">Transcript</text><text class="s" x="146" y="584">append-only JSONL</text>
  <rect class="box orange" x="380" y="540" width="190" height="62"/><text class="h" x="431" y="565">State</text><text class="s" x="405" y="584">cwd / model / goal / usage</text>
  <rect class="box orange" x="640" y="540" width="190" height="62"/><text class="h" x="686" y="565">FileHistory</text><text class="s" x="668" y="584">turn-level undo/redo</text>
  <path class="line" d="M1225 284 C1130 430 370 455 216 540"/>
  <path class="line" d="M1225 284 C1120 448 552 454 476 540"/>
  <path class="line" d="M1225 284 C1140 468 805 480 734 540"/>
  <text class="s" x="120" y="655">Transcript 派生 LLM messages；State 保存 activeGoal 等可恢复字段；FileHistory 服务 turn 级撤销。</text>

  <rect class="group" x="950" y="460" width="380" height="250"/>
  <text class="h" x="976" y="492">Direct Engine.run 例外</text>
  <rect class="box warn" x="1000" y="535" width="280" height="70"/><text class="h" x="1038" y="560">嵌入式 / 专用路径</text><text class="s" x="1024" y="580">SDK、子 Agent、测试或 runner 可直接装配 Engine</text>
  <path class="dash" d="M1140 535 C1100 430 1168 342 1200 284"/>
  <text class="s" x="1000" y="652">画图时不要表述成“所有 Engine.run 必经 protocol”；应写成 host 主路径或推荐 seam。</text>

  <rect class="box gray" x="95" y="760" width="1210" height="46"/>
  <text class="s" x="120" y="787">Protocol 负责跨 host 的统一 lifecycle、approval、stream events；Session 负责持久化与恢复。两者相关但不是同一个边界。</text>
</svg>
