<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Arena 与外部集成关系</title>
  <desc id="desc">展示 Arena、IterativeArena、DriveAgent/Claude/Codex、STT/review 等集成关系，以及外部 CLI 只跑单轮、时序由 CodeShell 控制的边界。</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#334155"/></marker>
    <style>
      .bg{fill:#f8fafc}.title{font:700 34px ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#0f172a}.sub{font:400 16px ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#475569}.h{font:700 16px ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#0f172a}.t{font:500 14px ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#334155}.s{font:400 12px ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#64748b}.box{stroke:#cbd5e1;stroke-width:1.5;rx:8}.blue{fill:#dbeafe;stroke:#60a5fa}.purple{fill:#ede9fe;stroke:#a78bfa}.green{fill:#dcfce7;stroke:#4ade80}.orange{fill:#ffedd5;stroke:#fb923c}.red{fill:#fee2e2;stroke:#f87171}.gray{fill:#f1f5f9;stroke:#94a3b8}.warn{fill:#fef3c7;stroke:#f59e0b}.group{fill:#ffffff;stroke:#e2e8f0;stroke-width:1.5;rx:8}.line{fill:none;stroke:#334155;stroke-width:2;marker-end:url(#arrow)}.dash{fill:none;stroke:#64748b;stroke-width:2;stroke-dasharray:7 6;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text class="title" x="56" y="58">Arena 与 Integrations：多模型评审、创作与外部 CLI 编排</text>
  <text class="sub" x="56" y="88">Arena 内部负责评审/创作流程；Claude/Codex 等外部 CLI 被当作可替换黑盒，时序、重试、审批都在 CodeShell 侧。</text>

  <rect class="group" x="60" y="126" width="980" height="330"/>
  <text class="h" x="86" y="158">Arena review pipeline</text>
  <rect class="box blue" x="110" y="214" width="120" height="56"/><text class="h" x="142" y="238">Plan</text><text class="s" x="132" y="257">planner</text>
  <rect class="box orange" x="290" y="214" width="150" height="56"/><text class="h" x="324" y="238">Evidence</text><text class="s" x="318" y="257">repo / docs / git</text>
  <rect class="box green" x="500" y="214" width="150" height="56"/><text class="h" x="538" y="238">Research</text><text class="s" x="528" y="257">participants</text>
  <rect class="box purple" x="710" y="214" width="130" height="56"/><text class="h" x="748" y="238">Claims</text><text class="s" x="734" y="257">registry</text>
  <rect class="box green" x="890" y="214" width="120" height="56"/><text class="h" x="912" y="238">Consensus</text><text class="s" x="918" y="257">adjudicate</text>
  <path class="line" d="M230 242 L290 242"/><path class="line" d="M440 242 L500 242"/><path class="line" d="M650 242 L710 242"/><path class="line" d="M840 242 L890 242"/>
  <rect class="box gray" x="170" y="338" width="210" height="54"/><text class="h" x="218" y="361">lenses</text><text class="s" x="200" y="380">architecture / product / engineering</text>
  <rect class="box gray" x="460" y="338" width="210" height="54"/><text class="h" x="514" y="361">strategies</text><text class="s" x="490" y="380">planning / review / discussion</text>
  <rect class="box orange" x="750" y="338" width="210" height="54"/><text class="h" x="814" y="361">Ledger</text><text class="s" x="780" y="380">append-only 记录 claim 生命周期</text>
  <path class="dash" d="M275 338 C330 300 438 270 500 250"/><path class="dash" d="M565 338 C600 310 678 272 748 250"/><path class="line" d="M950 270 C942 300 902 322 855 338"/>

  <rect class="group" x="1090" y="126" width="450" height="330"/>
  <text class="h" x="1116" y="158">IterativeArena creation loop</text>
  <rect class="box blue" x="1140" y="208" width="150" height="50"/><text class="h" x="1182" y="231">Seeds</text><text class="s" x="1168" y="249">draft proposals</text>
  <rect class="box green" x="1340" y="208" width="150" height="50"/><text class="h" x="1378" y="231">Tournament</text><text class="s" x="1372" y="249">rank / select</text>
  <rect class="box purple" x="1340" y="310" width="150" height="50"/><text class="h" x="1386" y="333">Argue</text><text class="s" x="1364" y="351">critique / defend</text>
  <rect class="box orange" x="1140" y="310" width="150" height="50"/><text class="h" x="1184" y="333">Revise</text><text class="s" x="1168" y="351">improve candidate</text>
  <rect class="box green" x="1240" y="392" width="150" height="38"/><text class="t" x="1274" y="416">Converged final</text>
  <path class="line" d="M1290 233 L1340 233"/><path class="line" d="M1415 258 L1415 310"/><path class="line" d="M1340 335 L1290 335"/><path class="line" d="M1215 310 L1215 258"/><path class="dash" d="M1215 360 C1220 382 1260 390 1315 392"/>

  <rect class="group" x="60" y="520" width="760" height="260"/>
  <text class="h" x="86" y="552">cc-orchestrator / DriveAgent 外部 CLI</text>
  <rect class="box green" x="110" y="610" width="160" height="58"/><text class="h" x="154" y="634">DriveAgent</text><text class="s" x="138" y="653">builtin tool / adapter</text>
  <rect class="box purple" x="330" y="610" width="180" height="58"/><text class="h" x="366" y="634">AgentAdapter</text><text class="s" x="358" y="653">session / history / relevance</text>
  <rect class="box purple" x="570" y="610" width="190" height="58"/><text class="h" x="612" y="634">ExternalAgentDriver</text><text class="s" x="600" y="653">spawn one round</text>
  <rect class="box orange" x="350" y="706" width="150" height="44"/><text class="t" x="388" y="733">Claude CLI</text>
  <rect class="box orange" x="560" y="706" width="150" height="44"/><text class="t" x="600" y="733">Codex CLI</text>
  <path class="line" d="M270 639 L330 639"/><path class="line" d="M510 639 L570 639"/><path class="line" d="M665 668 L425 706"/><path class="line" d="M665 668 L635 706"/>
  <rect class="box warn" x="110" y="706" width="180" height="44"/><text class="s" x="132" y="725">时序 / 重试 / 审批</text><text class="s" x="132" y="741">留在 CodeShell 层</text>

  <rect class="group" x="880" y="520" width="660" height="260"/>
  <text class="h" x="906" y="552">STT / review 等旁路集成</text>
  <rect class="box blue" x="930" y="612" width="180" height="58"/><text class="h" x="976" y="636">STT</text><text class="s" x="958" y="655">resolveTranscribe / UI input</text>
  <rect class="box green" x="1170" y="612" width="160" height="58"/><text class="h" x="1210" y="636">task text</text><text class="s" x="1198" y="655">进入普通 run</text>
  <path class="line" d="M1110 641 L1170 641"/>
  <rect class="box orange" x="930" y="706" width="180" height="44"/><text class="t" x="970" y="733">review-prompt</text>
  <rect class="box purple" x="1170" y="706" width="210" height="44"/><text class="t" x="1204" y="733">review strategy / lens</text>
  <path class="line" d="M1110 728 L1170 728"/>
  <path class="dash" d="M1380 706 C1328 520 1050 442 950 270"/>

  <rect class="box gray" x="88" y="832" width="1424" height="40"/>
  <text class="s" x="112" y="857">边界提醒：Claude/Codex CLI 不承载 CodeShell 的循环调度；driver 子进程通常非 detached，worker 重启不代表外部 CLI 自动续跑。</text>
</svg>
