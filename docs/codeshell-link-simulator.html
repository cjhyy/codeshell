<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>codeshell 链路模拟器</title>
<style>
  :root{
    --bg:#0d1117; --panel:#161b22; --panel2:#1c2430; --border:#30363d;
    --core:#3b82f6; --desktop:#a855f7; --tui:#22c55e; --ext:#f59e0b;
    --text:#e6edf3; --dim:#8b949e; --hot:#ffd166; --line:#f97316;
    --node:#21262d; --nodehot:#2d333b;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--text);
    font:13px/1.5 -apple-system,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;}
  #app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
  header{padding:10px 16px;border-bottom:1px solid var(--border);background:var(--panel);
    display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  header h1{font-size:15px;margin:0;font-weight:600}
  header .sub{color:var(--dim);font-size:12px}
  .chains{display:flex;gap:8px;flex-wrap:wrap;margin-left:auto}
  .chain-btn{cursor:pointer;border:1px solid var(--border);background:var(--panel2);
    color:var(--text);border-radius:7px;padding:6px 11px;font-size:12px;transition:.15s;display:flex;gap:7px;align-items:center}
  .chain-btn:hover{border-color:var(--hot);background:var(--nodehot)}
  .chain-btn.active{border-color:var(--hot);background:#3a3215;box-shadow:0 0 0 1px var(--hot) inset}
  .chain-btn .dot{width:9px;height:9px;border-radius:50%}
  main{display:flex;flex:1;min-height:0}
  #stage{flex:1;position:relative;overflow:auto;padding:14px}
  #svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:5}
  .lanes{position:relative;z-index:1;display:flex;flex-direction:column;gap:14px;min-width:1180px}
  .lane{border:1px solid var(--border);border-radius:10px;background:var(--panel);padding:10px 12px 14px}
  .lane-head{display:flex;align-items:center;gap:8px;margin-bottom:9px;font-weight:600;font-size:13px}
  .lane-head .tag{font-size:11px;color:var(--dim);font-weight:400}
  .lane .grid{display:flex;flex-wrap:wrap;gap:8px}
  .node{border:1px solid var(--border);background:var(--node);border-radius:8px;
    padding:7px 9px;min-width:118px;max-width:150px;position:relative;transition:.18s;cursor:default}
  .node .t{font-weight:600;font-size:12px;margin-bottom:2px}
  .node .d{color:var(--dim);font-size:10.5px;line-height:1.35;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .node.dim{opacity:.28}
  .node.hot{border-color:var(--hot);background:var(--nodehot);box-shadow:0 0 0 1px var(--hot) inset, 0 0 14px rgba(255,209,102,.18)}
  .node .step-badge{position:absolute;top:-9px;left:-9px;width:20px;height:20px;border-radius:50%;
    background:var(--line);color:#1a1206;font-weight:700;font-size:11px;display:none;
    align-items:center;justify-content:center;border:2px solid var(--bg);z-index:6}
  .node.hot .step-badge{display:flex}
  .node .step-badge.multi{font-size:9px}
  .lane.core .lane-head .swatch,.legend .core{background:var(--core)}
  .lane.desktop .lane-head .swatch,.legend .desktop{background:var(--desktop)}
  .lane.tui .lane-head .swatch,.legend .tui{background:var(--tui)}
  .swatch{width:11px;height:11px;border-radius:3px;display:inline-block}
  .node.k-core{border-left:3px solid var(--core)}
  .node.k-desktop{border-left:3px solid var(--desktop)}
  .node.k-tui{border-left:3px solid var(--tui)}
  .node.k-ext{border-left:3px solid var(--ext)}
  /* side panel */
  #side{width:392px;flex-shrink:0;border-left:1px solid var(--border);background:var(--panel);
    display:flex;flex-direction:column;min-height:0}
  #side .title{padding:12px 14px;border-bottom:1px solid var(--border);font-weight:600;font-size:13px}
  #side .title small{display:block;color:var(--dim);font-weight:400;margin-top:3px;font-size:11.5px}
  #steps{overflow:auto;padding:10px 12px;flex:1}
  .step{border:1px solid var(--border);border-radius:8px;background:var(--panel2);padding:9px 10px;margin-bottom:8px;cursor:pointer;transition:.15s}
  .step:hover{border-color:var(--hot)}
  .step.active{border-color:var(--hot);background:#2a2614}
  .step .h{display:flex;gap:8px;align-items:center;margin-bottom:3px}
  .step .num{width:19px;height:19px;border-radius:50%;background:var(--line);color:#1a1206;
    font-weight:700;font-size:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .step .h b{font-size:12.5px}
  .step .h .loc{margin-left:auto;font-size:10px;color:var(--dim);font-family:ui-monospace,Menlo,monospace}
  .step .body{color:var(--dim);font-size:11.5px;line-height:1.5}
  .step .files{margin-top:5px;display:flex;flex-wrap:wrap;gap:4px}
  .step .files code{font-family:ui-monospace,Menlo,monospace;font-size:10px;background:#0b1f33;
    color:#7fb2ff;border:1px solid #1b3a5c;border-radius:4px;padding:1px 5px}
  .empty{color:var(--dim);padding:30px 16px;text-align:center;line-height:1.7}
  footer{padding:6px 16px;border-top:1px solid var(--border);background:var(--panel);
    color:var(--dim);font-size:11px;display:flex;gap:16px;align-items:center;flex-wrap:wrap}
  .legend{display:flex;gap:14px;align-items:center}
  .legend span{display:flex;gap:5px;align-items:center}
  .ctrl{display:flex;gap:6px;margin-left:auto;align-items:center}
  .ctrl button{cursor:pointer;border:1px solid var(--border);background:var(--panel2);color:var(--text);
    border-radius:6px;padding:4px 9px;font-size:11px}
  .ctrl button:hover{border-color:var(--hot)}
</style>
</head>
<body>
<div id="app">
  <header>
    <div>
      <h1>codeshell · 链路模拟器</h1>
      <div class="sub">点一条入口链路 → 高亮经过的子模块 + 连线 + 右侧逐步说明</div>
    </div>
    <div class="chains" id="chains"></div>
  </header>

  <main>
    <div id="stage">
      <svg id="svg"><defs>
        <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
          <path d="M0,0 L9,4.5 L0,9 z" fill="var(--line)"></path>
        </marker>
      </defs></svg>
      <div class="lanes" id="lanes"></div>
    </div>
    <aside id="side">
      <div class="title" id="side-title">未选择链路
        <small id="side-sub">从顶部选择一条入口,即可看到完整调用链路与每一步做了什么。</small>
      </div>
      <div id="steps"><div class="empty">▲ 点击上方任意一条链路按钮<br>链路上的子模块会高亮并连线,<br>这里列出每一步干了什么。</div></div>
    </aside>
  </main>

  <footer>
    <div class="legend">
      <span><i class="swatch core"></i>core 引擎</span>
      <span><i class="swatch desktop"></i>desktop</span>
      <span><i class="swatch tui"></i>tui</span>
      <span><i class="swatch" style="background:var(--ext)"></i>外部/进程边界</span>
    </div>
    <div class="ctrl">
      <button id="btn-clear">清除高亮</button>
      <span id="hint" class="sub"></span>
    </div>
  </footer>
</div>

<script>
// ============ 子模块节点定义(分三泳道) ============
// id 唯一;lane=core|desktop|tui;kind 决定左色条
const LANES = [
  { id:'core', name:'CORE 引擎', tag:'@cjhyy/code-shell-core · packages/core/src', nodes:[
    {id:'core.protocol', t:'protocol', d:'JSON-RPC 线协议 · AgentServer/Client · 传输 · 多会话'},
    {id:'core.engine', t:'engine', d:'Engine 门面 + TurnLoop 回合循环状态机'},
    {id:'core.prompt', t:'prompt/hooks', d:'系统提示组装 + 生命周期钩子(on_stop 等)'},
    {id:'core.llm', t:'llm', d:'provider client + 能力层 + 模型池/重试/推理'},
    {id:'core.toolsys', t:'tool-system', d:'注册/校验/权限/沙箱并执行内置+MCP 工具'},
    {id:'core.permission', t:'permission/path', d:'权限分类 + 审批后端 + 路径安全策略'},
    {id:'core.sandbox', t:'sandbox/spawn', d:'seatbelt/bwrap/off 沙箱 + 安全子进程'},
    {id:'core.builtin', t:'builtin tools', d:'read/write/edit/bash/agent/web/mcp/apply-patch'},
    {id:'core.context', t:'context', d:'三层上下文压缩 + token 估算'},
    {id:'core.session', t:'session', d:'会话生命周期 + Transcript JSONL + 记忆'},
    {id:'core.settings', t:'settings', d:'多源配置合并 + 热重载 + feature flags'},
    {id:'core.run', t:'run', d:'受控运行:队列/状态机/检查点/审批挂起/锁'},
    {id:'core.automation', t:'automation/cron', d:'CronScheduler + 表达式 + write-policy + worktree'},
    {id:'core.arena', t:'arena', d:'多模型协作:证据驱动流水线 + iterate 创作'},
    {id:'core.services', t:'services', d:'记忆抽取/dream/遥测/通知/OAuth'},
    {id:'core.cli', t:'cli/runtime', d:'agent-server-stdio/tcp 进程入口 + 后台 shell'},
  ]},
  { id:'desktop', name:'DESKTOP', tag:'Electron 三进程 + 手机遥控 · packages/desktop/src', nodes:[
    {id:'desk.main', t:'main 进程', d:'ipcMain broker + 窗口/菜单 + 一组后端 service'},
    {id:'desk.bridge', t:'agent-bridge', d:'派生 agent worker 子进程(stdio JSON-RPC)广播快照'},
    {id:'desk.preload', t:'preload', d:'contextBridge 暴露 window.codeshell + IPC 中转'},
    {id:'desk.renderer', t:'renderer 顶层', d:'React 根 + 三栏 + 消息 reducer + 流路由'},
    {id:'desk.messages', t:'chat/messages', d:'输入控件 + 流归并折叠成卡片分组'},
    {id:'desk.toolcards', t:'tool-cards/审批', d:'工具卡 + 审批卡 + diff 视图'},
    {id:'desk.settings', t:'settings/面板', d:'设置页 + 工作区面板(文件/浏览器/终端)'},
    {id:'desk.automation', t:'automation host', d:'桌面 cron RunManager + run 归项目入侧栏'},
    {id:'desk.mobilesrv', t:'mobile-remote', d:'http+ws 遥控服务端 + 配对/信任/隧道/房间'},
    {id:'desk.mobileapp', t:'mobile App', d:'手机端 React 应用:WS 连接 + streamReducer'},
  ]},
  { id:'tui', name:'TUI', tag:'终端 REPL/CLI + 自研类 Ink 渲染引擎 · packages/tui/src', nodes:[
    {id:'tui.cli', t:'cli/bootstrap', d:'bin 入口 + setup + run/repl/子命令 + 斜杠命令'},
    {id:'tui.ui', t:'ui (React)', d:'startInkRepl + App + 聊天 store + 各组件'},
    {id:'tui.render', t:'render 引擎', d:'类 Ink:reconciler→DOM→Yoga→Screen→ANSI'},
    {id:'tui.yoga', t:'yoga-layout', d:'纯 TS flexbox 布局引擎'},
    {id:'tui.termio', t:'termio/events', d:'ANSI 解析 + DOM 风格事件 + 键盘/鼠标'},
  ]},
];
// 外部/边界虚拟节点(渲染在最上方一条窄带)
const EDGE_NODES = [
  {id:'edge.user', t:'用户输入', d:'终端键入 / 桌面输入框 / 手机消息', kind:'ext'},
  {id:'edge.llmapi', t:'LLM API', d:'Anthropic / OpenAI 兼容端点(网络)', kind:'ext'},
  {id:'edge.os', t:'OS / 终端 / FS', d:'子进程 / 文件系统 / 终端屏幕', kind:'ext'},
];

// ============ 五条链路定义 ============
// 每步: node(高亮哪个子模块), title, loc(文件锚点), body(干了什么), files[]
const CHAINS = {
  c1: { name:'① 用户消息 → 回复(turn loop 主链路)', color:'var(--core)', steps:[
    {node:'edge.user', title:'用户发出一条消息', loc:'host', body:'TUI 输入框或 Desktop ChatView 收集到一条用户消息(可带 @file/图片附件)。'},
    {node:'core.protocol', title:'AgentClient.run() → Transport → AgentServer', loc:'protocol/client.ts·server.ts', body:'宿主从不直接调引擎,而是经线协议:AgentClient 把 run 请求经 Transport(进程内/stdio/TCP)发给 AgentServer。', files:['protocol/client.ts','protocol/transport.ts','protocol/server.ts']},
    {node:'core.protocol', title:'ChatSession 入 FIFO turn 队列', loc:'protocol/chat-session.ts', body:'每个 UI tab 对应一个 ChatSession,持有单 Engine + AbortController,把这一轮排进 FIFO 串行队列。', files:['protocol/chat-session.ts','protocol/chat-session-manager.ts']},
    {node:'core.engine', title:'Engine.run() 驱动会话', loc:'engine/engine.ts', body:'Engine 门面装配模型/工具/上下文/Hook/会话,开始驱动一次运行。', files:['engine/engine.ts']},
    {node:'core.prompt', title:'PromptComposer 组装系统提示', loc:'prompt/composer.ts', body:'合并提示分段(sections/*.md)+ 指令文件(CLAUDE.md/AGENTS.md)+ 技能清单 + agent 预设 + 跨会话记忆。', files:['prompt/composer.ts','prompt/instruction-scanner.ts','session/memory.ts']},
    {node:'core.engine', title:'TurnLoop 状态机开跑', loc:'engine/turn-loop.ts', body:'pre_check → model_call → post_check → tool_exec → context_mgmt → hook_notify → 下一回合。', files:['engine/turn-loop.ts','engine/turn-state.ts']},
    {node:'core.llm', title:'ModelFacade → LLM client 流式调用', loc:'engine/model-facade.ts · llm/*', body:'createLLMClient 按 provider 造 Anthropic/OpenAI client;capabilitiesFor 抹平请求形状差异;流式拿增量。', files:['engine/model-facade.ts','llm/client-factory.ts','llm/providers/anthropic.ts','llm/capabilities/index.ts']},
    {node:'edge.llmapi', title:'打到 LLM 端点', loc:'network', body:'实际 HTTP 流式请求发往 Anthropic 或 OpenAI 兼容端点,带 stream-watchdog 防半死连接。', files:['llm/stream-watchdog.ts']},
    {node:'core.context', title:'增量 → StreamEvent;回合末检查压缩', loc:'context/manager.ts', body:'流式文本/思考/工具调用增量都转成 StreamEvent 推给宿主;回合结束按阈值决定 microcompact/summary/window 压缩。', files:['context/manager.ts','context/compaction.ts']},
    {node:'core.prompt', title:'HookRegistry.emit(on_stop) — goal 裁判', loc:'hooks/registry.ts', body:'若是 goal 模式,goal-stop-hook 用 LLM 判目标是否达成;未达成则阻断终止并续跑下一回合。', files:['hooks/registry.ts','hooks/goal-stop-hook.ts','engine/goal.ts']},
    {node:'core.session', title:'Transcript 落 JSONL', loc:'session/transcript.ts', body:'每个事件 append 到会话 JSONL;toMessages() 之后可从事件派生喂 LLM 的消息历史。', files:['session/transcript.ts','session/session-manager.ts']},
    {node:'core.protocol', title:'StreamEvent 回流宿主渲染', loc:'protocol/server.ts', body:'StreamEvent 经 AgentServer → AgentClient(EventEmitter)→ 宿主,驱动界面增量渲染。', files:['protocol/server.ts','protocol/client.ts']},
  ]},

  c2: { name:'② 工具调用全链路(审批/权限/沙箱)', color:'var(--core)', steps:[
    {node:'core.engine', title:'TurnLoop 收到 tool_use', loc:'engine/turn-loop.ts', body:'模型返回里含 tool_use 块,进入工具执行阶段。', files:['engine/turn-loop.ts']},
    {node:'core.engine', title:'StreamingToolQueue 排队', loc:'engine/streaming-tool-queue.ts', body:'流式到达的多个工具调用按序排队,避免乱序执行。', files:['engine/streaming-tool-queue.ts']},
    {node:'core.toolsys', title:'ToolExecutor.execute() 编排', loc:'tool-system/executor.ts', body:'统一编排:权限分类 → hook → 校验 → plan-mode 门控 → 实际执行,内含 hook 决策钳制。', files:['tool-system/executor.ts','tool-system/registry.ts']},
    {node:'core.permission', title:'权限分类 + 路径策略', loc:'tool-system/permission.ts · path-policy.ts', body:'PermissionClassifier 给工具调用分级;文件类工具再走 classifyPath(解析符号链接/查敏感路径/对比工作区根)产出 allow/ask/deny。', files:['tool-system/permission.ts','tool-system/path-policy.ts']},
    {node:'core.prompt', title:'HookRegistry.emit(pre_tool_use)', loc:'hooks/registry.ts', body:'触发 pre_tool_use 钩子,可改写参数或直接拦截/拒绝该工具。', files:['hooks/registry.ts','hooks/events.ts']},
    {node:'core.toolsys', title:'入参校验 + plan-mode 门控', loc:'tool-system/validation.ts · plan-mode-allowlist.ts', body:'轻量校验 required 与基本类型;plan 模式下只放行 allowlist 内的只读工具。', files:['tool-system/validation.ts','tool-system/plan-mode-allowlist.ts','tool-system/investigation-guard.ts']},
    {node:'core.permission', title:'需审批 → ApprovalBackend', loc:'tool-system/permission.ts', body:'交互:askUser(ToolContext)→宿主审批 UI;无头/自动:HeadlessApprovalBackend;Run 内:RunApprovalBackend 挂起到 resume。', files:['tool-system/context.ts','run/RunApprovalBackend.ts']},
    {node:'desk.toolcards', title:'(桌面)审批卡决策', loc:'renderer/approvals/*', body:'桌面端把审批请求渲染成 ApprovalCard,用户选 approve/reject + 记忆范围(once/session/project)+ 路径范围。', files:['renderer/approvals/ApprovalCard.tsx','renderer/approvals/approvalDecision.ts'], optional:true},
    {node:'core.builtin', title:'批准 → 执行具体工具', loc:'tool-system/builtin/*', body:'按工具类型执行:文件 read/write/edit/apply-patch;MCP 工具转发;子代理嵌套 Engine。', files:['tool-system/builtin/index.ts','tool-system/builtin/apply-patch/index.ts','tool-system/mcp-manager.ts','tool-system/builtin/agent.ts']},
    {node:'core.sandbox', title:'Bash → 安全子进程 + 沙箱', loc:'runtime/safe-spawn.ts · sandbox/*', body:'Bash 类命令经 safe-spawn(超时/中止/输出上限)在沙箱里跑:macOS seatbelt / Linux bwrap / off 直通。', files:['runtime/safe-spawn.ts','tool-system/sandbox/index.ts','tool-system/sandbox/seatbelt.ts']},
    {node:'edge.os', title:'落到 OS:进程 / 文件系统', loc:'OS', body:'真实子进程执行、文件读写发生在这里。', files:[]},
    {node:'core.toolsys', title:'ToolResult 回 TurnLoop', loc:'tool-system/executor.ts', body:'工具结果(大结果先落盘换引用)回到 TurnLoop,作为下一回合的输入继续。', files:['context/tool-result-storage.ts','engine/turn-loop.ts']},
  ]},

  c3: { name:'③ TUI 启动与渲染', color:'var(--tui)', steps:[
    {node:'tui.cli', title:'bin code-shell 启动', loc:'tui cli/main.ts', body:'commander 装配 run/repl/sessions/arena/runs/plugin 子命令;preAction 先调 setup。', files:['tui/cli/main.ts']},
    {node:'tui.cli', title:'setup() 会话初始化', loc:'tui bootstrap/setup.ts', body:'轮转日志、校验 Node 版本/cwd、bypassPermissions root 安全检查、chdir、git 仓库探测。', files:['tui/bootstrap/setup.ts']},
    {node:'tui.cli', title:'replCommand 装配管线', loc:'tui cli/commands/repl.ts', body:'解析 API key/onboarding gate;装配 Engine→EngineRuntime→ChatSessionManager→AgentServer。', files:['tui/cli/commands/repl.ts']},
    {node:'core.protocol', title:'in-process transport 接 UI↔引擎', loc:'protocol/helpers.ts', body:'createInProcessTransport 把 Engine 包成进程内 AgentServer+AgentClient 对(TUI 同进程,无子进程)。', files:['protocol/helpers.ts','protocol/factories.ts']},
    {node:'core.automation', title:'bindCronToEngine 绑 cron', loc:'automation/runner.ts', body:'把本会话的 CronScheduler 接到 Engine,支持后台定时任务。', files:['automation/runner.ts'], optional:true},
    {node:'tui.ui', title:'startInkRepl → App', loc:'tui ui/index.tsx · App.tsx', body:'装配 ThemeProvider + App;初始化历史/perf 探针;App 编排消息流/命令输入/工具+agent 卡/状态栏。', files:['tui/ui/index.tsx','tui/ui/App.tsx','tui/ui/store.ts']},
    {node:'tui.render', title:'自研 render:reconciler → DOM', loc:'tui render/root.ts · ink.tsx', body:'render() 起 Ink 实例;react-reconciler 把 React 树映射到自研 DOM 节点树。', files:['tui/render/root.ts','tui/render/ink.tsx','tui/render/reconciler.ts','tui/render/dom.ts']},
    {node:'tui.yoga', title:'Yoga flexbox 布局', loc:'tui render/layout/yoga.ts', body:'DOM 节点交给纯 TS 实现的 yoga-layout 算 flex 布局,得出每个节点的矩形。', files:['tui/render/layout/yoga.ts','tui/native-ts/yoga-layout/index.ts']},

// ============ 渲染节点 ============
const lanesEl = document.getElementById('lanes');
const svg = document.getElementById('svg');
const nodeIndex = {}; // id -> {el, kind}

// 顶部边界带
const edgeLane = document.createElement('div');
edgeLane.className='lane'; edgeLane.style.borderStyle='dashed';
edgeLane.innerHTML = `<div class="lane-head"><i class="swatch" style="background:var(--ext)"></i>外部 / 进程边界 <span class="tag">用户 · LLM API · OS/终端/FS</span></div>`;
const edgeGrid = document.createElement('div'); edgeGrid.className='grid';
EDGE_NODES.forEach(n=>edgeGrid.appendChild(makeNode(n, n.kind)));
edgeLane.appendChild(edgeGrid); lanesEl.appendChild(edgeLane);

LANES.forEach(lane=>{
  const el = document.createElement('div');
  el.className = 'lane '+lane.id;
  el.innerHTML = `<div class="lane-head"><i class="swatch"></i>${lane.name} <span class="tag">${lane.tag}</span></div>`;
  const grid = document.createElement('div'); grid.className='grid';
  lane.nodes.forEach(n=> grid.appendChild(makeNode(n, lane.id)) );
  el.appendChild(grid);
  lanesEl.appendChild(el);
});

function makeNode(n, kind){
  const d = document.createElement('div');
  d.className = 'node k-'+kind;
  d.id = 'node-'+n.id;
  d.innerHTML = `<div class="step-badge" id="badge-${n.id}"></div><div class="t">${n.t}</div><div class="d">${n.d}</div>`;
  nodeIndex[n.id] = {el:d, kind};
  return d;
}

// ============ 链路按钮 ============
const chainsEl = document.getElementById('chains');
Object.entries(CHAINS).forEach(([key,ch])=>{
  const b = document.createElement('div');
  b.className='chain-btn'; b.dataset.key=key;
  b.innerHTML = `<span class="dot" style="background:${ch.color}"></span>${ch.name}`;
  b.onclick = ()=>selectChain(key);
  chainsEl.appendChild(b);
});

let activeKey = null;

function selectChain(key){
  activeKey = key;
  document.querySelectorAll('.chain-btn').forEach(b=>b.classList.toggle('active', b.dataset.key===key));
  const ch = CHAINS[key];
  // reset nodes
  Object.values(nodeIndex).forEach(o=>{ o.el.classList.remove('hot'); o.el.classList.add('dim');
    const badge = o.el.querySelector('.step-badge'); badge.textContent=''; badge.classList.remove('multi'); });
  // collect node -> step numbers
  const nodeSteps = {};
  ch.steps.forEach((s,i)=>{ (nodeSteps[s.node] ||= []).push(i+1); });
  Object.entries(nodeSteps).forEach(([nid, nums])=>{
    const o = nodeIndex[nid]; if(!o) return;
    o.el.classList.add('hot'); o.el.classList.remove('dim');
    const badge = o.el.querySelector('.step-badge');
    badge.textContent = nums.length>1 ? nums[0]+'·'+nums[nums.length-1] : nums[0];
    if(nums.length>1) badge.classList.add('multi');
  });
  renderSteps(ch);
  // draw after layout settles
  requestAnimationFrame(()=>requestAnimationFrame(()=>drawLines(ch)));
  document.getElementById('side-title').firstChild.textContent = ch.name;
  document.getElementById('side-sub').textContent = `${ch.steps.length} 步 · 点击右侧任一步可定位到对应子模块`;
  document.getElementById('hint').textContent = '提示:连线按步骤顺序绘制,数字徽标=该子模块在链路中的步序';
}

function renderSteps(ch){
  const wrap = document.getElementById('steps');
  wrap.innerHTML='';
  ch.steps.forEach((s,i)=>{
    const node = nodeIndex[s.node];
    const div = document.createElement('div');
    div.className='step'; div.dataset.node=s.node; div.dataset.idx=i;
    const files = (s.files&&s.files.length)? `<div class="files">${s.files.map(f=>`<code>${f}</code>`).join('')}</div>`:'';
    div.innerHTML = `<div class="h"><span class="num">${i+1}</span><b>${s.title}</b><span class="loc">${s.loc||''}</span></div>
      <div class="body">${s.body}${s.optional?' <span style="color:var(--ext)">(可选/条件分支)</span>':''}</div>${files}`;
    div.onclick = ()=>{
      document.querySelectorAll('.step').forEach(x=>x.classList.remove('active'));
      div.classList.add('active');
      const o = nodeIndex[s.node];
      if(o){ o.el.scrollIntoView({behavior:'smooth',block:'center'});
        o.el.animate([{boxShadow:'0 0 0 3px var(--hot)'},{boxShadow:'0 0 0 1px var(--hot) inset'}],{duration:650}); }
    };
    wrap.appendChild(div);
  });
}

function center(el, hostRect){
  const r = el.getBoundingClientRect();
  return { x: r.left - hostRect.left + r.width/2, y: r.top - hostRect.top + r.height/2,
           top:r.top-hostRect.top, bottom:r.bottom-hostRect.top, h:r.height };
}

function drawLines(ch){
  const stage = document.getElementById('stage');
  // size svg to scroll content
  const host = stage.getBoundingClientRect();
  svg.setAttribute('width', stage.scrollWidth);
  svg.setAttribute('height', stage.scrollHeight);
  // clear old paths
  [...svg.querySelectorAll('path.link')].forEach(p=>p.remove());
  // build ordered unique-ish sequence of node centers (skip consecutive same-node)
  const seq = [];
  ch.steps.forEach(s=>{ if(!seq.length || seq[seq.length-1].node!==s.node) seq.push(s); });
  const scrollLeft = stage.scrollLeft, scrollTop = stage.scrollTop;
  function pt(nid){
    const o = nodeIndex[nid]; if(!o) return null;
    const r = o.el.getBoundingClientRect();
    return { x: r.left - host.left + scrollLeft + r.width/2,
             y: r.top  - host.top  + scrollTop  + r.height/2,
             top: r.top - host.top + scrollTop, bottom: r.bottom - host.top + scrollTop };
  }
  for(let i=0;i<seq.length-1;i++){
    const a = pt(seq[i].node), b = pt(seq[i+1].node);
    if(!a||!b) continue;
    // curved cubic; exit from bottom-ish, enter from top-ish for vertical separation
    const dy = b.y - a.y;
    const ay = dy>=0 ? a.bottom : a.top;
    const by = dy>=0 ? b.top : b.bottom;
    const midY = (ay+by)/2;
    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    const d = `M ${a.x} ${ay} C ${a.x} ${midY}, ${b.x} ${midY}, ${b.x} ${by}`;
    path.setAttribute('d', d);
    path.setAttribute('class','link');
    path.setAttribute('fill','none');
    path.setAttribute('stroke','var(--line)');
    path.setAttribute('stroke-width','2');
    path.setAttribute('opacity','0.75');
    path.setAttribute('marker-end','url(#arrow)');
    path.setAttribute('stroke-dasharray', path.getTotalLength?'':'');
    svg.appendChild(path);
    // animate draw
    try{
      const len = path.getTotalLength();
      path.style.strokeDasharray = len;
      path.style.strokeDashoffset = len;
      path.animate([{strokeDashoffset:len},{strokeDashoffset:0}],{duration:380,delay:i*70,fill:'forwards',easing:'ease-out'});
    }catch(e){}
  }
}

document.getElementById('btn-clear').onclick = ()=>{
  activeKey=null;
  document.querySelectorAll('.chain-btn').forEach(b=>b.classList.remove('active'));
  Object.values(nodeIndex).forEach(o=>{ o.el.classList.remove('hot','dim');
    const b=o.el.querySelector('.step-badge'); b.textContent=''; });
  [...svg.querySelectorAll('path.link')].forEach(p=>p.remove());
  document.getElementById('steps').innerHTML='<div class="empty">▲ 点击上方任意一条链路按钮</div>';
  document.getElementById('side-title').firstChild.textContent='未选择链路';
  document.getElementById('side-sub').textContent='从顶部选择一条入口。';
  document.getElementById('hint').textContent='';
};

// redraw lines on resize / scroll
let rt;
window.addEventListener('resize', ()=>{ if(activeKey){ clearTimeout(rt); rt=setTimeout(()=>drawLines(CHAINS[activeKey]),120);} });
document.getElementById('stage').addEventListener('scroll', ()=>{ if(activeKey) drawLines(CHAINS[activeKey]); });

// auto-select first chain
selectChain('c1');
</script>
