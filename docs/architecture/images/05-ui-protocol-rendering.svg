<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">UI、协议与渲染细节图</title>
  <desc id="desc">交互层通过协议隔离 Engine，并使用项目内自研 Ink-like renderer</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
  </defs>
  <style>
    .title { font: 700 34px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
    .subtitle { font: 500 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
    .box-title { font: 700 19px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
    .box-caption { font: 500 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
    .group-title { font: 700 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748b; text-transform: uppercase; letter-spacing: 0.04em; }
    .edge-label { font: 600 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; paint-order: stroke; stroke: #f8fafc; stroke-width: 5px; }
    .note-title { font: 700 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
    .note { font: 500 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
  </style>
  <rect width="100%" height="100%" fill="#f8fafc"/>
  <text x="48" y="54" class="title">UI、协议与渲染细节图</text>
  <text x="48" y="84" class="subtitle">交互层通过协议隔离 Engine，并使用项目内自研 Ink-like renderer</text>
  <g filter="url(#shadow)">
  
    <g>
      <rect x="60" y="130" width="470" height="650" rx="16" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="8 8"/>
      <text x="78" y="158" class="group-title">UI App</text>
    </g>

    <g>
      <rect x="590" y="130" width="360" height="650" rx="16" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="8 8"/>
      <text x="608" y="158" class="group-title">Protocol</text>
    </g>

    <g>
      <rect x="1010" y="130" width="500" height="650" rx="16" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="8 8"/>
      <text x="1028" y="158" class="group-title">Runtime + Renderer</text>
    </g>

    <path d="M 200 268 C 250 268, 250 330, 300 330" fill="none" stroke="#334155" stroke-width="2.4" marker-end="url(#arrow)"/>
    

    <path d="M 400 268 C 350 268, 350 330, 300 330" fill="none" stroke="#334155" stroke-width="2.4" marker-end="url(#arrow)"/>
    

    <path d="M 410 375 C 530 375, 530 273, 650 273" fill="none" stroke="#334155" stroke-width="2.4" marker-end="url(#arrow)"/>
    

    <path d="M 765 316 C 765 316, 765 390, 765 390" fill="none" stroke="#334155" stroke-width="2.4" marker-end="url(#arrow)"/>
    

    <path d="M 765 476 C 765 476, 765 550, 765 550" fill="none" stroke="#334155" stroke-width="2.4" marker-end="url(#arrow)"/>
    

    <path d="M 880 593 C 975 593, 975 273, 1070 273" fill="none" stroke="#334155" stroke-width="2.4" marker-end="url(#arrow)"/>
    

    <path d="M 1260 273 C 1275 273, 1275 273, 1290 273" fill="none" stroke="#334155" stroke-width="2.4" marker-end="url(#arrow)"/>
    

    <path d="M 1290 273 C 1085 273, 1085 273, 880 273" fill="none" stroke="#334155" stroke-width="2.4" marker-end="url(#arrow)"/>
    <text x="1085" y="265" text-anchor="middle" class="edge-label">notifications</text>

    <path d="M 650 273 C 530 273, 530 375, 410 375" fill="none" stroke="#334155" stroke-width="2.4" marker-end="url(#arrow)"/>
    <text x="530" y="316" text-anchor="middle" class="edge-label">events</text>

    <path d="M 300 420 C 250 420, 250 500, 200 500" fill="none" stroke="#334155" stroke-width="2.4" marker-end="url(#arrow)"/>
    

    <path d="M 290 542 C 302.5 542, 302.5 542, 315 542" fill="none" stroke="#334155" stroke-width="2.4" marker-end="url(#arrow)"/>
    

    <path d="M 485 542 C 887.5 542, 887.5 433, 1290 433" fill="none" stroke="#334155" stroke-width="2.4" marker-end="url(#arrow)"/>
    

    <path d="M 1070 433 C 975 433, 975 593, 880 593" fill="none" stroke="#334155" stroke-width="2.4" marker-end="url(#arrow)"/>
    <text x="975" y="505" text-anchor="middle" class="edge-label">approve</text>

    <path d="M 880 593 C 975 593, 975 433, 1070 433" fill="none" stroke="#334155" stroke-width="2.4" marker-end="url(#arrow)"/>
    <text x="975" y="505" text-anchor="middle" class="edge-label">request</text>

    <path d="M 1375 476 C 1325 476, 1325 585, 1275 585" fill="none" stroke="#334155" stroke-width="2.4" marker-end="url(#arrow)"/>
    

    <g id="input">
      <rect x="110" y="190" width="180" height="78" rx="10" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"/>
      <text x="200" y="218" text-anchor="middle" class="box-title">CommandInput</text>
      <text x="200" y="246" text-anchor="middle" class="box-caption">用户输入 / slash</text>
    </g>

    <g id="registry">
      <rect x="315" y="190" width="170" height="78" rx="10" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
      <text x="400" y="218" text-anchor="middle" class="box-title">CommandRegistry</text>
      <text x="400" y="246" text-anchor="middle" class="box-caption">/model /resume</text><text x="400" y="263" text-anchor="middle" class="box-caption">/compact ...</text>
    </g>

    <g id="app">
      <rect x="190" y="330" width="220" height="90" rx="10" fill="#ede9fe" stroke="#6d28d9" stroke-width="2"/>
      <text x="300" y="358" text-anchor="middle" class="box-title">App.tsx</text>
      <text x="300" y="386" text-anchor="middle" class="box-caption">run state、session、model</text><text x="300" y="403" text-anchor="middle" class="box-caption">approval、panels</text>
    </g>

    <g id="store">
      <rect x="110" y="500" width="180" height="84" rx="10" fill="#cffafe" stroke="#0e7490" stroke-width="2"/>
      <text x="200" y="528" text-anchor="middle" class="box-title">chatStore</text>
      <text x="200" y="556" text-anchor="middle" class="box-caption">useSyncExternalStore</text><text x="200" y="573" text-anchor="middle" class="box-caption">streaming entries</text>
    </g>

    <g id="views">
      <rect x="315" y="500" width="170" height="84" rx="10" fill="#e2e8f0" stroke="#334155" stroke-width="2"/>
      <text x="400" y="528" text-anchor="middle" class="box-title">UI Components</text>
      <text x="400" y="556" text-anchor="middle" class="box-caption">MessageList</text><text x="400" y="573" text-anchor="middle" class="box-caption">ToolCall</text><text x="400" y="590" text-anchor="middle" class="box-caption">StatusLine</text>
    </g>

    <g id="client">
      <rect x="650" y="230" width="230" height="86" rx="10" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"/>
      <text x="765" y="258" text-anchor="middle" class="box-title">AgentClient</text>
      <text x="765" y="286" text-anchor="middle" class="box-caption">run / approve</text><text x="765" y="303" text-anchor="middle" class="box-caption">cancel / query</text>
    </g>

    <g id="transport">
      <rect x="650" y="390" width="230" height="86" rx="10" fill="#fef3c7" stroke="#b45309" stroke-width="2"/>
      <text x="765" y="418" text-anchor="middle" class="box-title">Transport</text>
      <text x="765" y="446" text-anchor="middle" class="box-caption">in-process</text><text x="765" y="463" text-anchor="middle" class="box-caption">or stdio JSONL</text>
    </g>

    <g id="server">
      <rect x="650" y="550" width="230" height="86" rx="10" fill="#ede9fe" stroke="#6d28d9" stroke-width="2"/>
      <text x="765" y="578" text-anchor="middle" class="box-title">AgentServer</text>
      <text x="765" y="606" text-anchor="middle" class="box-caption">pending approvals</text><text x="765" y="623" text-anchor="middle" class="box-caption">stream forwarding</text>
    </g>

    <g id="engine">
      <rect x="1070" y="230" width="190" height="86" rx="10" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"/>
      <text x="1165" y="258" text-anchor="middle" class="box-title">Engine</text>
      <text x="1165" y="286" text-anchor="middle" class="box-caption">run task</text>
    </g>

    <g id="stream">
      <rect x="1290" y="230" width="170" height="86" rx="10" fill="#fce7f3" stroke="#be185d" stroke-width="2"/>
      <text x="1375" y="258" text-anchor="middle" class="box-title">StreamEvent</text>
      <text x="1375" y="286" text-anchor="middle" class="box-caption">text / tool</text><text x="1375" y="303" text-anchor="middle" class="box-caption">usage / task</text>
    </g>

    <g id="approval">
      <rect x="1070" y="390" width="190" height="86" rx="10" fill="#fee2e2" stroke="#b91c1c" stroke-width="2"/>
      <text x="1165" y="418" text-anchor="middle" class="box-title">Approval UI</text>
      <text x="1165" y="446" text-anchor="middle" class="box-caption">PermissionPrompt</text><text x="1165" y="463" text-anchor="middle" class="box-caption">AskUserPrompt</text>
    </g>

    <g id="render">
      <rect x="1290" y="390" width="170" height="86" rx="10" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
      <text x="1375" y="418" text-anchor="middle" class="box-title">Renderer</text>
      <text x="1375" y="446" text-anchor="middle" class="box-caption">Box / Text</text><text x="1375" y="463" text-anchor="middle" class="box-caption">ScrollBox</text>
    </g>

    <g id="terminal">
      <rect x="1180" y="585" width="190" height="86" rx="10" fill="#e2e8f0" stroke="#334155" stroke-width="2"/>
      <text x="1275" y="613" text-anchor="middle" class="box-title">Terminal</text>
      <text x="1275" y="641" text-anchor="middle" class="box-caption">layout、events</text><text x="1275" y="658" text-anchor="middle" class="box-caption">ANSI、focus</text>
    </g>
  </g>
</svg>
