<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="920" viewBox="0 0 1600 920" role="img" aria-labelledby="title desc">
  <title id="title">运行流细节图</title>
  <desc id="desc">从 CLI 输入到 Engine 多轮执行，再回到终端显示与持久化</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
  </defs>
  <style>
    .title { font: 700 34px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
    .subtitle { font: 500 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
    .box-title { font: 700 19px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
    .box-caption { font: 500 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
    .group-title { font: 700 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748b; text-transform: uppercase; letter-spacing: 0.04em; }
    .edge-label { font: 600 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; paint-order: stroke; stroke: #f8fafc; stroke-width: 5px; }
    .note-title { font: 700 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
    .note { font: 500 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
  </style>
  <rect width="100%" height="100%" fill="#f8fafc"/>
  <text x="48" y="54" class="title">运行流细节图</text>
  <text x="48" y="84" class="subtitle">从 CLI 输入到 Engine 多轮执行，再回到终端显示与持久化</text>
  <g filter="url(#shadow)">
  
    <path d="M 260 223 C 290 223, 290 223, 320 223" fill="none" stroke="#334155" stroke-width="2.4" marker-end="url(#arrow)"/>
    

    <path d="M 530 223 C 560 223, 560 223, 590 223" fill="none" stroke="#334155" stroke-width="2.4" marker-end="url(#arrow)"/>
    

    <path d="M 810 223 C 845 223, 845 223, 880 223" fill="none" stroke="#334155" stroke-width="2.4" marker-end="url(#arrow)"/>
    

    <path d="M 1070 223 C 1100 223, 1100 223, 1130 223" fill="none" stroke="#334155" stroke-width="2.4" marker-end="url(#arrow)"/>
    

    <path d="M 1330 223 C 1360 223, 1360 223, 1390 223" fill="none" stroke="#334155" stroke-width="2.4" marker-end="url(#arrow)"/>
    

    <path d="M 1230 266 C 1165 266, 1165 370, 1100 370" fill="none" stroke="#334155" stroke-width="2.4" marker-end="url(#arrow)"/>
    <text x="1165" y="310" text-anchor="middle" class="edge-label">model_call</text>

    <path d="M 1230 266 C 1165 266, 1165 540, 1100 540" fill="none" stroke="#334155" stroke-width="2.4" marker-end="url(#arrow)"/>
    <text x="1165" y="395" text-anchor="middle" class="edge-label">tool_exec</text>

    <path d="M 1205 586 C 1072.5 586, 1072.5 586, 940 586" fill="none" stroke="#334155" stroke-width="2.4" marker-end="url(#arrow)"/>
    <text x="1072.5" y="578" text-anchor="middle" class="edge-label">tool results</text>

    <path d="M 940 586 C 810 586, 810 586, 680 586" fill="none" stroke="#334155" stroke-width="2.4" marker-end="url(#arrow)"/>
    <text x="810" y="578" text-anchor="middle" class="edge-label">messages</text>

    <path d="M 1230 266 C 1032.5 266, 1032.5 710, 835 710" fill="none" stroke="#334155" stroke-width="2.4" marker-end="url(#arrow)"/>
    <text x="1032.5" y="480" text-anchor="middle" class="edge-label">onStream</text>

    <path d="M 940 754 C 810 754, 810 754, 680 754" fill="none" stroke="#334155" stroke-width="2.4" marker-end="url(#arrow)"/>
    <text x="810" y="746" text-anchor="middle" class="edge-label">display</text>

    <path d="M 575 632 C 575 632, 575 710, 575 710" fill="none" stroke="#334155" stroke-width="2.4" marker-end="url(#arrow)"/>
    <text x="575" y="663" text-anchor="middle" class="edge-label">resume/list</text>

    <g id="cmd">
      <rect x="70" y="180" width="190" height="86" rx="10" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"/>
      <text x="165" y="208" text-anchor="middle" class="box-title">CLI Command</text>
      <text x="165" y="236" text-anchor="middle" class="box-caption">repl / run / arena</text>
    </g>

    <g id="settings">
      <rect x="320" y="180" width="210" height="86" rx="10" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
      <text x="425" y="208" text-anchor="middle" class="box-title">Settings + Auth</text>
      <text x="425" y="236" text-anchor="middle" class="box-caption">配置合并、onboarding</text><text x="425" y="253" text-anchor="middle" class="box-caption">模型/API key</text>
    </g>

    <g id="transport">
      <rect x="590" y="180" width="220" height="86" rx="10" fill="#ede9fe" stroke="#6d28d9" stroke-width="2"/>
      <text x="700" y="208" text-anchor="middle" class="box-title">AgentClient / Server</text>
      <text x="700" y="236" text-anchor="middle" class="box-caption">in-process JSON-RPC</text><text x="700" y="253" text-anchor="middle" class="box-caption">cancel / query / approve</text>
    </g>

    <g id="engine">
      <rect x="880" y="180" width="190" height="86" rx="10" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"/>
      <text x="975" y="208" text-anchor="middle" class="box-title">Engine.run</text>
      <text x="975" y="236" text-anchor="middle" class="box-caption">创建 ToolContext</text><text x="975" y="253" text-anchor="middle" class="box-caption">session + prompt</text>
    </g>

    <g id="turn">
      <rect x="1130" y="180" width="200" height="86" rx="10" fill="#fef3c7" stroke="#b45309" stroke-width="2"/>
      <text x="1230" y="208" text-anchor="middle" class="box-title">TurnLoop</text>
      <text x="1230" y="236" text-anchor="middle" class="box-caption">循环直到完成</text>
    </g>

    <g id="done">
      <rect x="1390" y="180" width="150" height="86" rx="10" fill="#e2e8f0" stroke="#334155" stroke-width="2"/>
      <text x="1465" y="208" text-anchor="middle" class="box-title">Result</text>
      <text x="1465" y="236" text-anchor="middle" class="box-caption">text + reason</text>
    </g>

    <g id="model">
      <rect x="995" y="370" width="210" height="92" rx="10" fill="#cffafe" stroke="#0e7490" stroke-width="2"/>
      <text x="1100" y="398" text-anchor="middle" class="box-title">ModelFacade</text>
      <text x="1100" y="426" text-anchor="middle" class="box-caption">streaming</text><text x="1100" y="443" text-anchor="middle" class="box-caption">fallback / usage</text>
    </g>

    <g id="tool">
      <rect x="995" y="540" width="210" height="92" rx="10" fill="#fee2e2" stroke="#b91c1c" stroke-width="2"/>
      <text x="1100" y="568" text-anchor="middle" class="box-title">ToolExecutor</text>
      <text x="1100" y="596" text-anchor="middle" class="box-caption">permission</text><text x="1100" y="613" text-anchor="middle" class="box-caption">hooks / sandbox</text>
    </g>

    <g id="context">
      <rect x="730" y="540" width="210" height="92" rx="10" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
      <text x="835" y="568" text-anchor="middle" class="box-title">ContextManager</text>
      <text x="835" y="596" text-anchor="middle" class="box-caption">compact / persist</text><text x="835" y="613" text-anchor="middle" class="box-caption">large tool results</text>
    </g>

    <g id="session">
      <rect x="470" y="540" width="210" height="92" rx="10" fill="#ede9fe" stroke="#6d28d9" stroke-width="2"/>
      <text x="575" y="568" text-anchor="middle" class="box-title">SessionManager</text>
      <text x="575" y="596" text-anchor="middle" class="box-caption">state.json</text><text x="575" y="613" text-anchor="middle" class="box-caption">transcript.jsonl</text>
    </g>

    <g id="stream">
      <rect x="730" y="710" width="210" height="88" rx="10" fill="#fce7f3" stroke="#be185d" stroke-width="2"/>
      <text x="835" y="738" text-anchor="middle" class="box-title">Stream Events</text>
      <text x="835" y="766" text-anchor="middle" class="box-caption">text_delta</text><text x="835" y="783" text-anchor="middle" class="box-caption">tool_result / usage</text>
    </g>

    <g id="renderer">
      <rect x="470" y="710" width="210" height="88" rx="10" fill="#e2e8f0" stroke="#334155" stroke-width="2"/>
      <text x="575" y="738" text-anchor="middle" class="box-title">Renderer</text>
      <text x="575" y="766" text-anchor="middle" class="box-caption">REPL UI</text><text x="575" y="783" text-anchor="middle" class="box-caption">or headless output</text>
    </g>
  </g>
</svg>
